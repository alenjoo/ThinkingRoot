<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8" />
<meta name="viewport" content="width=device-width, initial-scale=1.0" />
<title>ThinkingRoot — Knowledge Graph</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700&display=swap" rel="stylesheet">
<script src="https://unpkg.com/lucide@latest"></script>
<style>
* { margin: 0; padding: 0; box-sizing: border-box; }
body { 
  background: radial-gradient(circle at 50% 50%, #1a1e26 0%, #0a0c10 100%);
  color: #e6edf3; 
  font-family: 'Inter', -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif; 
  overflow: hidden; 
}
#graph-container { width: 100vw; height: 100vh; }

/* Header */
#header {
  position: fixed; top: 0; left: 0; right: 0; z-index: 100;
  padding: 10px 20px;
  background: rgba(10, 14, 20, 0.5); 
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  box-shadow: inset 0 -1px 0 rgba(255,255,255,0.06);
  display: flex; align-items: center; gap: 12px;
}
#logo { 
  display: flex; align-items: center; gap: 8px;
  font-size: 16px; font-weight: 800; color: #ffffff; letter-spacing: 0.5px; white-space: nowrap; 
}
#logo i { color: #58a6ff; stroke-width: 2.5px; width: 22px; height: 22px; }
.header-divider { width: 1px; height: 20px; background: rgba(255,255,255,0.1); margin: 0 4px; }

.select-wrapper {
  position: relative; display: flex; align-items: center;
}
.select-wrapper i.select-icon {
  position: absolute; left: 10px; color: #8b949e; width: 14px; height: 14px; pointer-events: none;
}
.select-wrapper i.select-caret {
  position: absolute; right: 10px; color: #8b949e; width: 14px; height: 14px; pointer-events: none;
}
#workspace-select {
  appearance: none; -webkit-appearance: none;
  background: rgba(22, 27, 34, 0.6); border: 1px solid rgba(255,255,255,0.06); color: #e6edf3;
  padding: 6px 32px; border-radius: 8px; font-size: 13px; outline: none; font-weight: 500;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 2px 4px rgba(0,0,0,0.2);
  transition: all 0.2s; cursor: pointer;
}
#workspace-select:hover { background: rgba(22, 27, 34, 0.9); border-color: rgba(255,255,255,0.15); }
#workspace-select:focus { border-color: #58a6ff; }

#stats { font-size: 12px; color: #8b949e; margin-left: auto; white-space: nowrap; font-weight: 500; }

/* Buttons */
.btn {
  display: flex; align-items: center; gap: 6px;
  background: rgba(22, 27, 34, 0.6); border: 1px solid rgba(255,255,255,0.06); color: #c9d1d9;
  padding: 6px 14px; border-radius: 8px; font-size: 12px; font-weight: 500;
  cursor: pointer; transition: all 0.2s cubic-bezier(0.16, 1, 0.3, 1); white-space: nowrap;
  box-shadow: inset 0 1px 0 rgba(255,255,255,0.04), 0 2px 4px rgba(0,0,0,0.2);
}
.btn i { width: 14px; height: 14px; }
.btn:hover { background: rgba(22, 27, 34, 0.9); border-color: rgba(255,255,255,0.15); color: #ffffff; transform: translateY(-1px); }
.btn:active { transform: translateY(0); }
.btn.active { background: rgba(255,74,74,0.15); border-color: rgba(255,74,74,0.3); color: #FF4A4A; }
.btn.active i { color: #FF4A4A; }

/* Filters panel */
#panel {
  position: fixed; top: 52px; right: 0; bottom: 0; width: 220px;
  background: rgba(10, 14, 20, 0.5); 
  backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
  box-shadow: inset 1px 0 0 rgba(255,255,255,0.04);
  z-index: 100;
  display: flex; flex-direction: column; overflow: hidden;
}
#panel-header { padding: 14px 16px 10px; border-bottom: 1px solid #21262d; }
#panel-header h4 { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 10px; }
#search-input {
  width: 100%; background: #0d1117; border: 1px solid #30363d; color: #e6edf3;
  padding: 7px 10px; border-radius: 6px; font-size: 13px; outline: none;
}
#search-input:focus { border-color: #58a6ff; }
#panel-body { padding: 14px 16px; overflow-y: auto; flex: 1; }
.section-title { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 1.5px; margin: 14px 0 8px; }
.filter-item {
  display: flex; align-items: center; gap: 8px;
  font-size: 12px; color: #c9d1d9; margin-bottom: 6px; cursor: pointer;
  padding: 3px 0;
}
.filter-item input { accent-color: #58a6ff; }
.color-dot { width: 9px; height: 9px; border-radius: 50%; flex-shrink: 0; }
.filter-item.hidden-type { opacity: 0.35; }
.rel-line { display: flex; align-items: center; gap: 8px; font-size: 12px; color: #8b949e; margin-bottom: 5px; }
.rel-swatch { width: 18px; height: 3px; border-radius: 2px; flex-shrink: 0; }

/* Tooltip */
#tooltip {
  position: fixed; top: 0; left: 0; z-index: 300;
  background: rgba(10, 14, 20, 0.65); 
  border-radius: 8px;
  padding: 12px 14px; max-width: 260px; pointer-events: none; opacity: 0;
  backdrop-filter: blur(24px); -webkit-backdrop-filter: blur(24px);
  box-shadow: 0 12px 32px rgba(0,0,0,0.5), inset 0 0 0 1px rgba(255,255,255,0.1);
  transform: translate(-1000px, -1000px);
  transition: opacity 0.2s;
}
.tt-name { font-size: 14px; font-weight: 700; color: #e6edf3; margin-bottom: 3px; }
.tt-type { font-size: 10px; text-transform: uppercase; letter-spacing: 1px; margin-bottom: 8px; }
.tt-row { font-size: 12px; color: #c9d1d9; margin-bottom: 3px; display: flex; justify-content: space-between; gap: 16px; }
.tt-label { color: #8b949e; }
.tt-sep { border-top: 1px solid #21262d; margin: 8px 0; }
.tt-hint { font-size: 11px; color: #444; }

/* Sidebar */
#sidebar {
  position: fixed; top: 52px; left: 0; bottom: 0; width: 300px;
  background: rgba(10, 14, 20, 0.55);
  box-shadow: inset -1px 0 0 rgba(255,255,255,0.06), 10px 0 30px rgba(0,0,0,0.5);
  z-index: 200; transform: translateX(-100%); transition: transform 0.3s cubic-bezier(0.16, 1, 0.3, 1);
  overflow-y: auto; backdrop-filter: blur(28px); -webkit-backdrop-filter: blur(28px);
}
#sidebar.open { transform: translateX(0); }
#sb-inner { padding: 20px 18px; }
.sb-close {
  position: absolute; top: 14px; right: 14px;
  background: none; border: none; color: #8b949e; cursor: pointer; font-size: 16px;
}
.sb-close:hover { color: #e6edf3; }
.sb-name { font-size: 20px; font-weight: 700; color: #e6edf3; margin-bottom: 3px; word-break: break-word; }
.sb-type { font-size: 11px; text-transform: uppercase; letter-spacing: 1.5px; margin-bottom: 16px; }
.sb-stats { display: flex; gap: 10px; margin-bottom: 16px; }
.sb-stat { flex: 1; text-align: center; background: #161b22; padding: 10px; border-radius: 8px; }
.sb-stat-n { font-size: 20px; font-weight: 700; }
.sb-stat-l { font-size: 11px; color: #8b949e; margin-top: 2px; }
.sb-aliases { font-size: 12px; color: #8b949e; margin-bottom: 12px; }
.sb-section { font-size: 10px; color: #8b949e; text-transform: uppercase; letter-spacing: 1.5px; margin: 18px 0 10px; border-top: 1px solid #21262d; padding-top: 14px; }
.sb-rel { display: flex; align-items: center; gap: 8px; font-size: 13px; margin-bottom: 8px; }
.sb-rel-type { font-size: 11px; padding: 2px 6px; border-radius: 4px; background: rgba(255,255,255,0.06); }
.sb-claim { font-size: 13px; color: #c9d1d9; margin-bottom: 8px; padding: 10px; background: #161b22; border-radius: 6px; border-left: 3px solid #30363d; line-height: 1.5; }
.sb-claim-meta { font-size: 11px; color: #8b949e; margin-bottom: 5px; display: flex; gap: 8px; }
.sb-empty { font-size: 13px; color: #8b949e; font-style: italic; }

/* Loading overlay */
#loading {
  position: fixed; inset: 0; background: #0d1117;
  display: flex; align-items: center; justify-content: center;
  z-index: 1000; flex-direction: column; gap: 14px;
}
.load-logo { font-size: 22px; font-weight: 700; color: #58a6ff; letter-spacing: 3px; }
.load-sub { font-size: 13px; color: #8b949e; }
.spinner {
  width: 28px; height: 28px;
  border: 3px solid #21262d; border-top-color: #58a6ff;
  border-radius: 50%; animation: spin 0.75s linear infinite;
}
@keyframes spin { to { transform: rotate(360deg); } }

/* Help hint */
#hint {
  position: fixed; bottom: 18px; right: 230px; z-index: 100;
  font-size: 11px; color: #444; pointer-events: none;
}
</style>
</head>
<body>

<div id="loading">
  <div class="spinner"></div>
  <div class="load-logo">⬡ THINKINGROOT</div>
  <div class="load-sub" id="load-status">Connecting to knowledge graph...</div>
</div>

<div id="header">
  <div id="logo">
    <i data-lucide="network"></i>
    <span>ThinkingRoot</span>
  </div>
  
  <div class="header-divider"></div>

  <div class="select-wrapper">
    <i data-lucide="database" class="select-icon"></i>
    <select id="workspace-select"></select>
    <i data-lucide="chevron-down" class="select-caret"></i>
  </div>

  <button class="btn" id="contradiction-btn">
    <i data-lucide="zap"></i>
    <span>Contradictions</span>
  </button>
  <button class="btn" id="reset-btn">
    <i data-lucide="maximize"></i>
    <span>Reset view</span>
  </button>
  <div id="stats"></div>
</div>

<div id="panel">
  <div id="panel-header">
    <h4>Explorer</h4>
    <input type="text" id="search-input" placeholder="Search entities..." />
  </div>
  <div id="panel-body">
    <div class="section-title">Entity Types</div>
    <div id="type-filters"></div>
    <div class="section-title">Relation Types</div>
    <div id="rel-legend"></div>
  </div>
</div>

<div id="tooltip"></div>

<div id="sidebar">
  <button class="sb-close" onclick="closeSidebar()">✕</button>
  <div id="sb-inner"></div>
</div>

<div id="graph-container"></div>
<div id="hint">scroll to zoom · drag to pan · click node for details</div>

<script src="https://unpkg.com/force-graph@1.43.5/dist/force-graph.min.js"></script>
<script src="https://d3js.org/d3.v7.min.js"></script>
<script>

// ── Palette ─────────────────────────────────────────────────────────

const ENTITY_COLORS = {
  Person:       '#4A9EFF',
  System:       '#FF4A4A',
  Service:      '#A855F7',
  Api:          '#22C55E',
  Database:     '#F97316',
  Library:      '#EC4899',
  Team:         '#06B6D4',
  Concept:      '#EAB308',
  File:         '#94A3B8',
  Module:       '#64748B',
  Function:     '#10B981',
  Config:       '#F59E0B',
  Organization: '#8B5CF6',
};

const RELATION_COLORS = {
  DependsOn:    '#FF4A4A',
  OwnedBy:      '#4A9EFF',
  Implements:   '#22C55E',
  Calls:        '#F97316',
  Uses:         '#A855F7',
  Contains:     '#94A3B8',
  Replaces:     '#EAB308',
  Contradicts:  '#FF0080',
  CreatedBy:    '#06B6D4',
  PartOf:       '#64748B',
  RelatedTo:    '#555',
  ConfiguredBy: '#F59E0B',
  TestedBy:     '#10B981',
};

const DEFAULT_NODE_COLOR = '#58a6ff';
const DEFAULT_LINK_COLOR = '#333';

// ── Constants ────────────────────────────────────────────────────────

// ── State ────────────────────────────────────────────────────────────

let G = null;
let allNodes = [];
let allLinks = [];
let hiddenTypes = new Set();
let searchQuery = '';
let contradictionMode = false;
let selectedNode = null;
let currentWs = null;
let tooltipNode = null;
let hoveredNode = null;

// ── Boot ─────────────────────────────────────────────────────────────

async function init() {
  setStatus('Discovering workspaces...');
  const res = await api('/api/v1/workspaces');
  const workspaces = res?.data || [];

  if (!workspaces.length) {
    setStatus('No compiled workspaces found. Run: root compile ./your-project');
    return;
  }

  const sel = document.getElementById('workspace-select');
  workspaces.forEach(ws => {
    const o = document.createElement('option');
    o.value = ws.name;
    o.textContent = `${ws.name}  (${ws.entity_count} entities)`;
    sel.appendChild(o);
  });
  sel.onchange = () => loadWorkspace(sel.value);

  await loadWorkspace(workspaces[0].name);
}

async function loadWorkspace(name) {
  currentWs = name;
  setStatus(`Loading ${name}...`);
  document.getElementById('loading').style.display = 'flex';

  const [eRes, rRes] = await Promise.all([
    api(`/api/v1/ws/${encodeURIComponent(name)}/entities`),
    api(`/api/v1/ws/${encodeURIComponent(name)}/relations`),
  ]);

  const entities = eRes?.data || [];
  const rawRels  = rRes?.data || [];

  // Build id lookup by name
  const byName = {};
  allNodes = entities.map(e => {
    const n = {
      id:          e.id,
      name:        e.name,
      entity_type: e.entity_type || 'Concept',
      claim_count: e.claim_count || 1,
      _contradiction: false,
    };
    byName[e.name] = n;
    return n;
  });

  allLinks = [];
  rawRels.forEach(r => {
    const src = byName[r.from];
    const tgt = byName[r.to];
    if (src && tgt) {
      allLinks.push({
        source:        src.id,
        target:        tgt.id,
        relation_type: r.relation_type || 'RelatedTo',
        strength:      r.strength || 0.5,
      });
      if (r.relation_type === 'Contradicts') {
        src._contradiction = true;
        tgt._contradiction = true;
      }
    }
  });

  buildFilters();
  buildRelLegend();
  renderGraph();

  document.getElementById('stats').textContent =
    `${allNodes.length} entities · ${allLinks.length} relations`;

  document.getElementById('loading').style.display = 'none';
}

// ── Graph ─────────────────────────────────────────────────────────────

function nodeRadius(n) {
  return Math.max(4, Math.sqrt((n.claim_count || 1) + 1) * 4);
}

function renderGraph() {
  const container = document.getElementById('graph-container');

  if (!G) {
    G = ForceGraph()(container)
      .backgroundColor('rgba(0,0,0,0)') // Transparent back so CSS gradient shows
      .nodeId('id')
      .nodeLabel('')
      .nodeRelSize(1)
      .nodeVal(n => nodeRadius(n))
      .nodeCanvasObject(drawNode)
      .nodeCanvasObjectMode(() => 'replace')
      .linkColor(l => linkColor(l))
      .onRenderFramePre(ctx => {
        // Allows overlapping lines to additively glow rather than muddy up
        ctx.globalCompositeOperation = 'screen';
      })
      .onRenderFramePost(ctx => {
        ctx.globalCompositeOperation = 'source-over';
      })
      .linkWidth(l => Math.max(0.5, (l.strength || 0.5) * 1.8))
      .linkDirectionalArrowLength(3.5)
      .linkDirectionalArrowRelPos(1)
      .linkDirectionalParticles(l => l.relation_type === 'Contradicts' ? 4 : 0)
      .linkDirectionalParticleColor(() => '#FF0080')
      .linkDirectionalParticleWidth(2)
      .onNodeHover(onHover)
      .onNodeClick(onNodeClick)
      .onNodeDragEnd(() => {
        // Let physics settle naturally after drag
      })
      .onBackgroundClick(() => { closeSidebar(); deselect(); });

    // Charge: moderate repulsion with distance limits to prevent blowup
    G.d3Force('charge').strength(-130).distanceMin(2).distanceMax(400);

    // Links: springy, not rigid
    G.d3Force('link').distance(l => {
      const sr = nodeRadius(typeof l.source === 'object' ? l.source : { claim_count: 1 });
      const tr = nodeRadius(typeof l.target === 'object' ? l.target : { claim_count: 1 });
      return 60 + sr + tr;
    }).strength(0.25).iterations(2);

    // Collision: nodes never overlap
    if (typeof d3 !== 'undefined') {
      G.d3Force('collide', d3.forceCollide(n => nodeRadius(n) + 2).iterations(2));
    }

    // Center: very weak pull to keep graph centred
    G.d3Force('center') && G.d3Force('center').strength(0.03);

    // Warm up the simulation for initial layout
    G.d3ReheatSimulation();
  }

  G.graphData({ nodes: visibleNodes(), links: visibleLinks() });
}

function drawNode(node, ctx, scale) {
  const r     = nodeRadius(node);
  let color = nodeColor(node);
  const isHovered  = hoveredNode?.id === node.id;
  const isSelected = selectedNode?.id === node.id;

  const isMuted = color.length > 7; // hex with alpha

  // ── Hover glow ────────────────────────────────────────────────
  if (isHovered) {
    const grd = ctx.createRadialGradient(node.x, node.y, r * 0.5, node.x, node.y, r * 4.5);
    grd.addColorStop(0, color.slice(0,7) + '77');
    grd.addColorStop(1, color.slice(0,7) + '00');
    ctx.beginPath();
    ctx.arc(node.x, node.y, r * 4.5, 0, 2 * Math.PI);
    ctx.fillStyle = grd;
    ctx.fill();
  }

  // ── Selection halo ────────────────────────────────────────────
  if (isSelected) {
    ctx.beginPath();
    ctx.arc(node.x, node.y, r + 9, 0, 2 * Math.PI);
    ctx.fillStyle = color.slice(0,7) + '22';
    ctx.fill();
    ctx.beginPath();
    ctx.arc(node.x, node.y, r + 9, 0, 2 * Math.PI);
    ctx.strokeStyle = color.slice(0,7) + '99';
    ctx.lineWidth = 1.2;
    ctx.stroke();
  }

  // ── Contradiction pulse ring ───────────────────────────────────
  if (contradictionMode && node._contradiction) {
    ctx.beginPath();
    ctx.arc(node.x, node.y, r + 3.5, 0, 2 * Math.PI);
    ctx.strokeStyle = '#FF4A00cc';
    ctx.lineWidth = 2;
    ctx.stroke();
  }

  // ── Main circle (Orb Gradient) ────────────────────────────────
  ctx.beginPath();
  ctx.arc(node.x, node.y, r, 0, 2 * Math.PI);
  
  if (isMuted) {
    ctx.fillStyle = color; // keep it flat if it's dimmed
  } else {
    const nodeGrd = ctx.createRadialGradient(node.x - r*0.3, node.y - r*0.3, 0, node.x, node.y, r*1.2);
    nodeGrd.addColorStop(0, '#ffffff');
    nodeGrd.addColorStop(0.3, color);
    nodeGrd.addColorStop(1, color + 'aa');
    ctx.fillStyle = nodeGrd;
  }
  ctx.fill();

  // ── Hover inner highlight ─────────────────────────────────────
  if (isHovered) {
    ctx.beginPath();
    ctx.arc(node.x, node.y, r, 0, 2 * Math.PI);
    ctx.strokeStyle = '#ffffff55';
    ctx.lineWidth = 1.5;
    ctx.stroke();
  }

  // ── Label (zoomed in, or selected/hovered) ────────────────────
  if (scale > 1.8 || isSelected || isHovered) {
    const label    = node.name.length > 22 ? node.name.slice(0, 20) + '…' : node.name;
    const fontSize = Math.max(9, 11 / scale * 1.8);
    ctx.font = `${fontSize}px -apple-system, sans-serif`;
    ctx.textAlign = 'center';
    ctx.textBaseline = 'top';
    ctx.fillStyle = '#0d1117cc';
    ctx.fillText(label, node.x + 0.5, node.y + r + 4.5);
    ctx.fillStyle = isHovered ? '#ffffff' : '#e6edf3';
    ctx.fillText(label, node.x, node.y + r + 4);
  }
}

function nodeColor(n) {
  if (hiddenTypes.has(n.entity_type)) return '#ffffff08';
  if (searchQuery && !n.name.toLowerCase().includes(searchQuery)) return '#ffffff10';
  if (selectedNode) {
    const conn = connectedIds(selectedNode.id);
    if (n.id !== selectedNode.id && !conn.has(n.id)) return (ENTITY_COLORS[n.entity_type] || DEFAULT_NODE_COLOR) + '0D';
  }
  if (contradictionMode && n._contradiction) return '#FF4A00';
  return ENTITY_COLORS[n.entity_type] || DEFAULT_NODE_COLOR;
}

function linkColor(l) {
  const base = RELATION_COLORS[l.relation_type] || DEFAULT_LINK_COLOR;
  if (contradictionMode && l.relation_type === 'Contradicts') return '#FF0080';
  if (selectedNode) {
    const src = resolveId(l.source);
    const tgt = resolveId(l.target);
    if (src === selectedNode.id || tgt === selectedNode.id) return base + 'D9';
    return base + '07';
  }
  return base + '33';
}

function resolveId(x) { return typeof x === 'object' ? x.id : x; }

function connectedIds(id) {
  const ids = new Set();
  allLinks.forEach(l => {
    const s = resolveId(l.source), t = resolveId(l.target);
    if (s === id) ids.add(t);
    if (t === id) ids.add(s);
  });
  return ids;
}

function visibleNodes() {
  return allNodes.filter(n => !hiddenTypes.has(n.entity_type));
}

function visibleLinks() {
  const ids = new Set(visibleNodes().map(n => n.id));
  return allLinks.filter(l => ids.has(resolveId(l.source)) && ids.has(resolveId(l.target)));
}

function deselect() {
  selectedNode = null;
  if (G) { G.nodeColor(nodeColor); G.linkColor(linkColor); }
}

// ── Hover ─────────────────────────────────────────────────────────────

function onHover(node) {
  tooltipNode = node;
  hoveredNode = node;

  document.getElementById('graph-container').style.cursor = node ? 'pointer' : 'default';

  const tt = document.getElementById('tooltip');
  if (!node) { tt.style.opacity = '0'; return; }

  const relCount = allLinks.filter(l =>
    resolveId(l.source) === node.id || resolveId(l.target) === node.id
  ).length;

  const typeColor = ENTITY_COLORS[node.entity_type] || DEFAULT_NODE_COLOR;
  tt.style.opacity = '1';
  tt.innerHTML = `
    <div class="tt-name">${node.name}</div>
    <div class="tt-type" style="color:${typeColor}">${node.entity_type}</div>
    <div class="tt-sep"></div>
    <div class="tt-row"><span class="tt-label">Claims</span><span>${node.claim_count}</span></div>
    <div class="tt-row"><span class="tt-label">Relations</span><span>${relCount}</span></div>
    ${node._contradiction ? '<div class="tt-row" style="color:#FF4A00;margin-top:4px">⚡ Has contradictions</div>' : ''}
    <div class="tt-sep"></div>
    <div class="tt-hint">Click for full details</div>
  `;
  document.container = node;
}

let targetMouse = { x: -1000, y: -1000 };
let currentTt = { x: -1000, y: -1000 };

document.addEventListener('mousemove', e => {
  targetMouse.x = e.clientX + 18;
  targetMouse.y = Math.min(e.clientY - 10, window.innerHeight - 200);
});

function animateTooltip() {
  currentTt.x += (targetMouse.x - currentTt.x) * 0.15;
  currentTt.y += (targetMouse.y - currentTt.y) * 0.15;
  
  const tt = document.getElementById('tooltip');
  if (tt && tt.style.opacity > 0) {
    tt.style.transform = `translate(${currentTt.x}px, ${currentTt.y}px)`;
  }
  requestAnimationFrame(animateTooltip);
}
animateTooltip();

// ── Click → Sidebar ───────────────────────────────────────────────────

async function onNodeClick(node) {
  selectedNode = node;
  if (G) { G.nodeColor(nodeColor); G.linkColor(linkColor); }
  document.getElementById('tooltip').style.opacity = '0';

  G.centerAt(node.x, node.y, 500);
  G.zoom(Math.max(G.zoom(), 2.5), 500);

  const res = await api(`/api/v1/ws/${encodeURIComponent(currentWs)}/entities/${encodeURIComponent(node.name)}`);
  const detail = res?.data;

  const typeColor = ENTITY_COLORS[node.entity_type] || DEFAULT_NODE_COLOR;
  const relCount = allLinks.filter(l =>
    resolveId(l.source) === node.id || resolveId(l.target) === node.id
  ).length;

  // Build relations html
  const myRels = allLinks.filter(l =>
    resolveId(l.source) === node.id || resolveId(l.target) === node.id
  ).slice(0, 25);

  const relsHtml = myRels.map(l => {
    const isOut = resolveId(l.source) === node.id;
    const otherId = resolveId(isOut ? l.target : l.source);
    const other = allNodes.find(n => n.id === otherId);
    if (!other) return '';
    const rc = RELATION_COLORS[l.relation_type] || '#555';
    const oc = ENTITY_COLORS[other.entity_type] || DEFAULT_NODE_COLOR;
    return `<div class="sb-rel">
      <span style="color:${rc};font-size:12px">${isOut ? '→' : '←'}</span>
      <span class="sb-rel-type" style="color:${rc}">${l.relation_type}</span>
      <span style="color:${oc};cursor:pointer" onclick="jumpToNode('${other.id}')">${other.name}</span>
    </div>`;
  }).join('') || '<div class="sb-empty">No relations</div>';

  // Build claims html
  const claimsHtml = detail?.claims?.slice(0, 6).map(c => {
    const conf = Math.round((c.confidence || 0) * 100);
    return `<div class="sb-claim">
      <div class="sb-claim-meta">
        <span>${c.claim_type}</span>
        <span>${conf}% confidence</span>
      </div>
      ${c.statement}
    </div>`;
  }).join('') || '<div class="sb-empty">Run root compile to extract claims</div>';

  const aliasesHtml = detail?.aliases?.length
    ? `<div class="sb-aliases">Also known as: ${detail.aliases.join(', ')}</div>`
    : '';

  document.getElementById('sb-inner').innerHTML = `
    <div style="height:10px"></div>
    <div class="sb-name">${node.name}</div>
    <div class="sb-type" style="color:${typeColor}">${node.entity_type}</div>
    <div class="sb-stats">
      <div class="sb-stat">
        <div class="sb-stat-n" style="color:${typeColor}">${node.claim_count}</div>
        <div class="sb-stat-l">claims</div>
      </div>
      <div class="sb-stat">
        <div class="sb-stat-n">${relCount}</div>
        <div class="sb-stat-l">relations</div>
      </div>
    </div>
    ${aliasesHtml}
    <div class="sb-section">Relations</div>
    ${relsHtml}
    <div class="sb-section">Top Claims</div>
    ${claimsHtml}
  `;

  document.getElementById('sidebar').classList.add('open');
}

function jumpToNode(id) {
  const n = allNodes.find(x => x.id === id);
  if (n && n.x != null) {
    G.centerAt(n.x, n.y, 400);
    onNodeClick(n);
  }
}

function closeSidebar() {
  document.getElementById('sidebar').classList.remove('open');
  deselect();
}

// ── Filter / Legend ────────────────────────────────────────────────────

function buildFilters() {
  const types = [...new Set(allNodes.map(n => n.entity_type))].sort();
  document.getElementById('type-filters').innerHTML = types.map(t => {
    const c = ENTITY_COLORS[t] || DEFAULT_NODE_COLOR;
    return `<label class="filter-item" id="fi-${t}">
      <input type="checkbox" checked onchange="toggleType('${t}')" />
      <span class="color-dot" style="background:${c}"></span>
      <span>${t}</span>
    </label>`;
  }).join('');
}

function buildRelLegend() {
  const types = [...new Set(allLinks.map(l => l.relation_type))].sort();
  document.getElementById('rel-legend').innerHTML = types.map(t => {
    const c = RELATION_COLORS[t] || '#555';
    return `<div class="rel-line">
      <div class="rel-swatch" style="background:${c}"></div>
      <span>${t}</span>
    </div>`;
  }).join('');
}

function toggleType(type) {
  const el = document.getElementById(`fi-${type}`);
  if (hiddenTypes.has(type)) {
    hiddenTypes.delete(type);
    if (el) el.classList.remove('hidden-type');
  } else {
    hiddenTypes.add(type);
    if (el) el.classList.add('hidden-type');
  }
  G.graphData({ nodes: visibleNodes(), links: visibleLinks() });
  G.nodeColor(nodeColor);
}

// ── Search ─────────────────────────────────────────────────────────────

document.getElementById('search-input').addEventListener('input', e => {
  searchQuery = e.target.value.trim().toLowerCase();
  if (G) {
    G.nodeColor(nodeColor);
    if (searchQuery) {
      const match = allNodes.find(n =>
        n.name.toLowerCase().includes(searchQuery) && n.x != null
      );
      if (match) { G.centerAt(match.x, match.y, 400); G.zoom(3, 400); }
    }
  }
});

// ── Contradiction mode ─────────────────────────────────────────────────

document.getElementById('contradiction-btn').addEventListener('click', () => {
  contradictionMode = !contradictionMode;
  document.getElementById('contradiction-btn').classList.toggle('active', contradictionMode);
  if (G) { G.nodeColor(nodeColor); G.linkColor(linkColor); }
});

// ── Reset view ─────────────────────────────────────────────────────────

document.getElementById('reset-btn').addEventListener('click', () => {
  closeSidebar();
  if (G) G.zoomToFit(400, 60);
});

// ── Util ───────────────────────────────────────────────────────────────

async function api(path) {
  try {
    const r = await fetch(path);
    if (!r.ok) return null;
    return await r.json();
  } catch { return null; }
}

function setStatus(msg) {
  document.getElementById('load-status').textContent = msg;
}

// ── Start ──────────────────────────────────────────────────────────────

init();
lucide.createIcons();
</script>
</body>
</html>
