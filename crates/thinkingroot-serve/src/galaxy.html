<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>ThinkingRoot — Knowledge Galaxy</title>
    <!-- Use standard CDN for Three.js so it works without npm install -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script src="https://cdn.jsdelivr.net/npm/three@0.128.0/examples/js/controls/OrbitControls.js"></script>
    <!-- Animation library for smooth camera fly-to -->
    <script src="https://cdnjs.cloudflare.com/ajax/libs/gsap/3.12.2/gsap.min.js"></script>
    <!-- Add Font -->
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;600;800&display=swap" rel="stylesheet">
    <style>
        :root {
            --bg-color: #050510;
            --panel-bg: rgba(10, 10, 20, 0.85);
            --border-color: rgba(60, 60, 100, 0.4);
            --text-primary: #f0f0f5;
            --text-secondary: #9090a0;
            --accent: #00e5ff;
        }

        body {
            margin: 0;
            overflow: hidden;
            background-color: var(--bg-color);
            font-family: 'Inter', sans-serif;
            color: var(--text-primary);
        }

        #canvas-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 1;
        }

        /* Overlay UI */
        #hud {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            z-index: 10;
            pointer-events: none;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            box-sizing: border-box;
            transition: padding-right 0.3s cubic-bezier(0.16, 1, 0.3, 1);
        }

        #hud.drawer-open {
            padding-right: 400px;
        }

        .hud-panel {
            pointer-events: auto;
            background: transparent;
            border: none;
            padding: 20px;
            margin: 20px;
            box-shadow: none;
            backdrop-filter: none;
            transition: opacity 0.3s ease;
        }

        .hud-top {
            display: flex;
            justify-content: space-between;
            align-items: flex-start;
        }

        .hud-center-top {
            position: absolute;
            top: 20px;
            left: 50%;
            transform: translateX(-50%);
            display: flex;
            gap: 10px;
            pointer-events: auto;
        }

        .search-box {
            background: transparent;
            border: none;
            border-bottom: 1px solid rgba(255, 255, 255, 0.2);
            color: white;
            padding: 12px 10px;
            border-radius: 0;
            font-family: inherit;
            font-size: 14px;
            width: 300px;
            outline: none;
            box-shadow: none;
            transition: all 0.3s;
        }

        .search-box:focus {
            border-bottom: 1px solid rgba(255, 255, 255, 0.8);
            box-shadow: none;
        }

        .hud-bottom {
            width: 100%;
            display: flex;
            justify-content: center;
            padding-bottom: 30px;
            pointer-events: auto;
        }

        /* Timeline Slider CSS */
        .timeline-container {
            background: transparent;
            border: none;
            padding: 15px 25px;
            border-radius: 0;
            width: 80%;
            display: flex;
            flex-direction: column;
            gap: 10px;
            box-shadow: none;
            backdrop-filter: none;
        }

        .timeline-labels {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            color: var(--text-secondary);
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        input[type="range"] {
            -webkit-appearance: none;
            width: 100%;
            background: rgba(255, 255, 255, 0.2);
            height: 1px;
            border-radius: 0;
            outline: none;
        }

        input[type="range"]::-webkit-slider-thumb {
            -webkit-appearance: none;
            appearance: none;
            width: 2px;
            height: 12px;
            border-radius: 0;
            background: #ffffff;
            cursor: pointer;
            box-shadow: none;
        }

        .title-box {
            display: flex;
            align-items: center;
            gap: 15px;
        }

        /* Loading Screen */
        #loader {
            position: absolute;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background: var(--bg-color);
            z-index: 100;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            transition: opacity 0.5s ease;
        }

        .spinner {
            width: 40px;
            height: 40px;
            border: 3px solid rgba(0, 229, 255, 0.1);
            border-top-color: var(--accent);
            border-radius: 50%;
            animation: spin 1s linear infinite;
        }

        @keyframes spin {
            100% {
                transform: rotate(360deg);
            }
        }

        /* Workspace selector */
        select {
            background: transparent;
            color: white;
            border: none;
            padding: 8px 0;
            font-family: inherit;
            outline: none;
            cursor: pointer;
            font-weight: 600;
            letter-spacing: 1px;
            text-transform: uppercase;
        }

        /* Detail Drawer */
        #detail-drawer {
            position: absolute;
            top: 0;
            right: -450px;
            /* Hidden initially */
            width: 400px;
            height: 100%;
            background: linear-gradient(to right, transparent, rgba(0, 0, 0, 0.8) 30%, rgba(0, 0, 0, 0.95));
            border-left: none;
            z-index: 50;
            transition: right 0.3s cubic-bezier(0.16, 1, 0.3, 1);
            display: flex;
            flex-direction: column;
            overflow-y: auto;
            box-shadow: none;
            backdrop-filter: none;
        }

        #detail-drawer.open {
            right: 0;
        }

        .drawer-header {
            padding: 40px 30px 20px 30px;
            border-bottom: 1px solid rgba(255, 255, 255, 0.1);
            position: sticky;
            top: 0;
            background: rgba(5, 5, 16, 0.4);
            backdrop-filter: blur(15px);
            -webkit-backdrop-filter: blur(15px);
            z-index: 2;
        }

        .close-btn {
            position: absolute;
            top: 15px;
            right: 20px;
            background: none;
            border: none;
            color: var(--text-secondary);
            font-size: 24px;
            cursor: pointer;
            transition: color 0.2s;
        }

        .close-btn:hover {
            color: white;
        }

        .drawer-content {
            padding: 20px 30px;
        }

        .claim-card {
            background: transparent;
            border: none;
            border-left: 2px solid rgba(255, 255, 255, 0.2);
            border-radius: 0;
            padding: 0 0 0 15px;
            margin-bottom: 25px;
        }

        .claim-statement {
            font-size: 14px;
            line-height: 1.5;
            margin-bottom: 10px;
            color: var(--text-primary);
        }

        .claim-meta {
            display: flex;
            justify-content: space-between;
            font-size: 11px;
            text-transform: uppercase;
            letter-spacing: 1px;
        }

        .confidence-high {
            color: #00ff88;
        }

        .confidence-med {
            color: #ffaa00;
        }

        .confidence-low {
            color: #ff4444;
        }
    
/* Node labels (proximity ones) */
#node-overlay{position:fixed;inset:0;z-index:6;pointer-events:none;overflow:hidden}
.node-label{position:absolute;pointer-events:none;display:flex;align-items:center;gap:8px;transition:opacity .3s ease,transform .3s ease;transform:translate(-50%,-50%)}
.node-dot{width:4px;height:4px;background:currentColor;border-radius:50%;box-shadow:0 0 10px currentColor}
.node-text{font-size:10px;font-weight:700;letter-spacing:1px;text-transform:uppercase;color:var(--text);white-space:nowrap;background:rgba(5,5,16,0.6);padding:2px 6px;backdrop-filter:blur(4px);border-radius:2px}
</style>

</head>

    <script>
        let currentWorkspace = '';
        const loader = document.getElementById('loader');

        // --- THREE.JS SETUP ---
        const container = document.getElementById('canvas-container');
        const scene = new THREE.Scene();
        scene.fog = new THREE.FogExp2(0x050510, 0.001); // Deep space fog

        const camera = new THREE.PerspectiveCamera(60, window.innerWidth / window.innerHeight, 0.1, 10000);
        // Start camera at an isometric high angle
        camera.position.set(0, -800, 800);
        camera.lookAt(0, 0, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true, alpha: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.setPixelRatio(window.devicePixelRatio);
        // additive blending tricks for glowing neon
        container.appendChild(renderer.domElement);

        const controls = new THREE.OrbitControls(camera, renderer.domElement);
        controls.enableDamping = true;
        controls.dampingFactor = 0.05;
        controls.maxDistance = 5000;

        // Globals for cleanup
        let particles = null;
        let lines = null;
        let galaxyData = { nodes: [], links: [] };

        // Raycaster for hover/click
        const raycaster = new THREE.Raycaster();
        raycaster.params.Points.threshold = 15; // easier hovering
        const mouse = new THREE.Vector2();

            'Concept': new THREE.Color(0x3a2c5a),   // Deep subtle amethyst
            'System': new THREE.Color(0x00d4cc),    // Bioluminescent teal
            'Service': new THREE.Color(0x1a73e8),   // Core blue
            'Database': new THREE.Color(0xe6a800),  // Deep gold
            'Api': new THREE.Color(0x0bdc86),       // Emerald
            'Person': new THREE.Color(0xcc4466),    // Ruby
            '_default': new THREE.Color(0x445588)   // Faint twilight blue
        };

        const sparkTexture = new THREE.TextureLoader().load('https://raw.githubusercontent.com/mrdoob/three.js/master/examples/textures/sprites/spark1.png')
        const pointsMaterial = new THREE.ShaderMaterial({
            uniforms: {
                cameraDist: { value: 1000.0 },
                fogColor: { value: new THREE.Color(0x050510) },
                fogDensity: { value: 0.0005 } // Reduced for better depth visibility
            },
            vertexShader: `
                attribute float size;
                attribute vec3 pointColor;
                varying vec3 vColor;
                varying vec3 vViewPosition;
                void main() {
                    vColor = pointColor;
                    vec4 mvPosition = modelViewMatrix * vec4(position, 1.0);
                    vViewPosition = -mvPosition.xyz;
                    // Pro-grade size attenuation with distance floor
                    gl_PointSize = max(1.5, size * (230.0 / -mvPosition.z));
                    gl_Position = projectionMatrix * mvPosition;
                }
            `,
            fragmentShader: `
                uniform float cameraDist;
                uniform vec3 fogColor;
                uniform float fogDensity;
                varying vec3 vColor;
                varying vec3 vViewPosition;

                void main() {
                    vec2 p = gl_PointCoord - vec2(0.5);
                    float r2 = dot(p, p);
                    if (r2 > 0.25) discard;

                    // 1. Sphere Geometry
                    float z = sqrt(0.25 - r2);
                    vec3 normal = normalize(vec3(p.x, p.y, z));

                    // 2. High-Contrast Cinematic Lighting
                    vec3 lightDir = normalize(vec3(1.0, 2.0, 3.0));
                    vec3 viewDir = normalize(vViewPosition);
                    
                    float diff = max(dot(normal, lightDir), 0.15);
                    vec3 halfwayDir = normalize(lightDir + viewDir);
                    float spec = pow(max(dot(normal, halfwayDir), 0.0), 64.0);
                    float rim = pow(1.0 - max(dot(normal, vec3(0,0,1)), 0.0), 4.0);

                    // 3. HDR Color Composition (High-Vibrance & Positive Glow)
                    vec3 baseColor = vColor;
                    float luma = dot(baseColor, vec3(0.299, 0.587, 0.114));
                    baseColor = mix(vec3(luma), baseColor, 1.5);
                    
                    vec3 finalColor = baseColor * diff;
                    finalColor += baseColor * 0.6; 
                    finalColor += vec3(1.0) * spec * 1.2;
                    finalColor += baseColor * rim * 0.8;
                    
                    // 4. Exposure-Based Tone Mapping
                    float exposure = 1.4;
                    finalColor = 1.0 - exp(-exposure * finalColor);
                    
                    // 5. Exponential Fog Integration
                    float dist = length(vViewPosition);
                    float fogFactor = 1.0 - exp(-fogDensity * dist);
                    finalColor = mix(finalColor, fogColor, fogFactor);

                    // 6. Dual-Layer High Quality Alpha
                    float distCenter = length(p);
                    float core = smoothstep(0.48, 0.45, distCenter); 
                    float halo = smoothstep(0.5, 0.4, distCenter) * 0.4;
                    float alpha = max(core, halo);
                    
                    gl_FragColor = vec4(finalColor, alpha);
                }
            `,
            blending: THREE.NormalBlending,
            transparent: true,
            depthWrite: true,
            depthTest: true
        });

        const lineMaterial = new THREE.LineBasicMaterial({
            color: 0x6688ff, // Brighter Electric Blue
            transparent: true,
            opacity: 0.6, // Doubled opacity
            blending: THREE.AdditiveBlending,
            depthWrite: false
        });
;

        const clock = new THREE.Clock();

        // --- GLOBALS ---
        let originalColors = null;
        let timeMin = 0;
        let timeMax = 0;
        let currentTime = 0;
        let activeFocusNode = null;
        let nodeMapGlobal = new Map(); // Global node mapping

        // --- RENDER LOOP ---
        function animate() {
            requestAnimationFrame(animate);
            controls.update();

            const elapsed = clock.getElapsedTime();

            // Slower subtle rotation
            if (particles) {
                particles.rotation.z += 0.0005;
                if (lines) lines.rotation.z += 0.0005;
            }

            // Update shader distance for LOD transition
            const dist = camera.position.length();
            if (pointsMaterial.uniforms && pointsMaterial.uniforms.cameraDist) {
                pointsMaterial.uniforms.cameraDist.value = dist;
            }

            updateNodeLabels();

            renderer.render(scene, camera);
        }

        const nodeOverlay = document.getElementById('node-overlay');
        const activeLabels = new Map();

        function updateNodeLabels() {
            if (!nodeOverlay || !particles || !galaxyData.nodes) return;

            const dist = camera.position.length();
            // Only show node labels when zoomed in
            if (dist > 1200) {
                nodeOverlay.innerHTML = '';
                activeLabels.clear();
                return;
            }

            // Find nodes near the camera focus target or center of view
            // For simplicity, we'll check proximity to camera
            const positions = particles.geometry.attributes.position.array;
            const nodes = galaxyData.nodes;

            // Get frustum to check visibility
            const frustum = new THREE.Frustum();
            frustum.setFromProjectionMatrix(new THREE.Matrix4().multiplyMatrices(camera.projectionMatrix, camera.matrixWorldInverse));

            const visibleNodes = [];
            for (let i = 0; i < nodes.length; i++) {
                const node = nodes[i];
                const pos = new THREE.Vector3(positions[i * 3], positions[i * 3 + 1], positions[i * 3 + 2]);
                
                // Rotation check: account for particle group rotation
                pos.applyEuler(particles.rotation);

                if (frustum.containsPoint(pos)) {
                    const d = pos.distanceTo(camera.position);
                    if (d < 800) {
                        visibleNodes.push({ node, pos, d });
                    }
                }
            }

            // Limit to top 20 closest to prevent DOM explosion
            visibleNodes.sort((a, b) => a.d - b.d);
            const top = visibleNodes.slice(0, 20);

            // Update DOM
            const currentIds = new Set(top.map(v => v.node.id));

            // Remove old ones
            for (let [id, el] of activeLabels) {
                if (!currentIds.has(id)) {
                    el.style.opacity = '0';
                    setTimeout(() => {
                        if (el.parentNode) el.parentNode.removeChild(el);
                    }, 300);
                    activeLabels.delete(id);
                }
            }

            // Add/Update current
            top.forEach(v => {
                const screenPos = v.pos.clone().project(camera);
                const x = (screenPos.x * 0.5 + 0.5) * window.innerWidth;
                const y = (screenPos.y * -0.5 + 0.5) * window.innerHeight;

                let el = activeLabels.get(v.node.id);
                if (!el) {
                    el = document.createElement('div');
                    el.className = 'node-label';
                    el.innerHTML = `
                        <div class="node-dot"></div>
                        <div class="node-text">${v.node.name}</div>
                    `;
                    el.style.color = '#' + (typeColors[v.node.entity_type] || typeColors['_default']).getHexString();
                    nodeOverlay.appendChild(el);
                    activeLabels.set(v.node.id, el);
                    // trigger fade in
                    requestAnimationFrame(() => el.style.opacity = '1');
                }

                el.style.left = `${x}px`;
                el.style.top = `${y}px`;
                el.style.transform = `translate(-50%, -50%) scale(${Math.max(0.5, 1.0 - v.d / 1200)})`;
            });
        }
        animate();

        // --- RESIZE HANDLER ---
        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // --- DRAWER & FOCUS LOGIC ---
        function applyColors() {
            if (!particles || !originalColors) return;
            const colors = particles.geometry.attributes.color.array;

            // Re-apply base colors taking into account timeline and focus
            galaxyData.nodes.forEach((n, i) => {
                let r = originalColors[i * 3];
                let g = originalColors[i * 3 + 1];
                let b = originalColors[i * 3 + 2];

                // 1. Check Timeline
                if (n.created_at > currentTime) {
                    r = 0; g = 0; b = 0; // Not born yet
                }
                // 2. Check Focus Mode
                else if (activeFocusNode) {
                    const isFocus = n.id === activeFocusNode.id;
                    const isConnected = galaxyData.links.some(l =>
                        (l.source === activeFocusNode.id && l.target === n.id) ||
                        (l.target === activeFocusNode.id && l.source === n.id)
                    );

                    if (!isFocus && !isConnected) {
                        // Lighten the dimming extremely so the graph stays highly visible
                        r *= 0.7;
                        g *= 0.7;
                        b *= 0.7;
                    } else if (isFocus) {
                        // Blast target node luminosity to maximum white/bright color
                        r = Math.min(r + 0.8, 1.0);
                        g = Math.min(g + 0.8, 1.0);
                        b = Math.min(b + 0.8, 1.0);
                    } else {
                        // Connected nodes become bright
                        r = Math.min(r + 0.4, 1.0);
                        g = Math.min(g + 0.4, 1.0);
                        b = Math.min(b + 0.4, 1.0);
                    }
                }

                colors[i * 3] = r;
                colors[i * 3 + 1] = g;
                colors[i * 3 + 2] = b;
            });

            particles.geometry.attributes.color.needsUpdate = true;

            // Handle Lines Focus Mode
            if (lines) {
                const lineColors = lines.geometry.attributes.color.array;
                let j = 0;
                galaxyData.links.forEach(l => {
                    let r = 0.2, g = 0.3, b = 0.5; // Base color

                    if (activeFocusNode) {
                        if (l.source === activeFocusNode.id || l.target === activeFocusNode.id) {
                            // Highlight focused constellation
                            r = 0.5; g = 0.8; b = 1.0;
                        } else {
                            // Keep un-focused background web visible but faint
                            r = 0.05; g = 0.08; b = 0.12;
                        }
                    }

                    lineColors[j * 6] = r;
                    lineColors[j * 6 + 1] = g;
                    lineColors[j * 6 + 2] = b;
                    lineColors[j * 6 + 3] = r;
                    lineColors[j * 6 + 4] = g;
                    lineColors[j * 6 + 5] = b;
                    j++;
                });
                lines.geometry.attributes.color.needsUpdate = true;
            }
        }

        function closeDrawer() {
            document.getElementById('detail-drawer').classList.remove('open');
            document.getElementById('hud').classList.remove('drawer-open');
            activeFocusNode = null;
            applyColors();
        }

        async function openDrawer(node) {
            document.getElementById('drawer-title').innerText = node.name;
            const claimsContainer = document.getElementById('drawer-claims');
            document.getElementById('detail-drawer').classList.add('open');
            document.getElementById('hud').classList.add('drawer-open');

            // Focus Mode
            activeFocusNode = node;
            applyColors();

            claimsContainer.innerHTML = `<div style="text-align:center; padding:40px;"><div class="spinner" style="margin: 0 auto;"></div></div>`;

            try {
                // Fetch full entity detail to get claims and confidence
                const res = await fetch(`/api/v1/ws/${currentWorkspace}/entities/${encodeURIComponent(node.name)}`);
                const p = await res.json();
                if (!p.ok) throw new Error("Failed to load claims");

                const claims = p.data.claims;
                if (!claims || claims.length === 0) {
                    claimsContainer.innerHTML = `<div style="color: var(--text-secondary); font-style: italic;">No specific claims extracted.</div>`;
                    return;
                }

                claimsContainer.innerHTML = '';
                claims.forEach(c => {
                    const confClass = c.confidence >= 0.8 ? 'confidence-high' : (c.confidence >= 0.5 ? 'confidence-med' : 'confidence-low');
                    const confPercent = Math.round(c.confidence * 100) + '%';

                    claimsContainer.innerHTML += `
                        <div class="claim-card">
                            <div class="claim-statement">"${c.statement}"</div>
                            <div class="claim-meta">
                                <span style="color: var(--text-secondary)">Type: <span style="color: white">${c.claim_type}</span></span>
                                <span class="${confClass}">Conf: ${confPercent}</span>
                            </div>
                        </div>
                    `;
                });

            } catch (e) {
                console.error(e);
                claimsContainer.innerHTML = `<div style="color: #ff4444;">Error loading claims.</div>`;
            }
        }

        // --- INTERACTION HANDLER ---
        // Bind precisely to canvas to prevent drawer click-through
        renderer.domElement.addEventListener('mousemove', (event) => {
            if (!particles) return;
            // Calculate mouse position in normalized device coordinates
            mouse.x = (event.clientX / window.innerWidth) * 2 - 1;
            mouse.y = -(event.clientY / window.innerHeight) * 2 + 1; // correct GL inverted Y

            raycaster.setFromCamera(mouse, camera);

            // Intersect with point cloud
            const intersects = raycaster.intersectObject(particles);
            if (intersects.length > 0) {
                document.body.style.cursor = 'crosshair';
                const index = intersects[0].index;
                const node = galaxyData.nodes[index];

                // Show HUD
                document.getElementById('info-name').innerText = node.name;
                document.getElementById('info-type').innerText = node.entity_type;
                document.getElementById('info-claims').innerText = node.claim_count;
                infoPanel.style.opacity = '1';

            } else {
                document.body.style.cursor = 'default';
                infoPanel.style.opacity = '0';
            }
        });

        renderer.domElement.addEventListener('dblclick', (event) => {
            if (!particles) return;
            raycaster.setFromCamera(mouse, camera);
            const intersects = raycaster.intersectObject(particles);

            if (intersects.length > 0) {
                const index = intersects[0].index;
                const node = galaxyData.nodes[index];
                openDrawer(node);
            }
            // Side panel stays open during dragging and empty clicks
        });

        // --- LOGIC ---
        async function init() {
            try {
                const res = await fetch('/api/v1/workspaces');
                const p = await res.json();
                if (!p.ok) throw new Error(p.error.message);

                if (p.data.length > 0) {
                    currentWorkspace = p.data[0].name;
                    document.getElementById('workspace-name-display').innerText = currentWorkspace;
                    loadGalaxy(currentWorkspace);
                }
            } catch (error) {
                console.error("Initialization error:", error);
                document.getElementById('workspace-name-display').innerText = "ERROR";
            }
        }

        async function loadGalaxy(ws) {
            loader.style.opacity = '1';
            loader.style.pointerEvents = 'all';

            // Clean previous
            if (particles) scene.remove(particles);
            if (lines) scene.remove(lines);

            try {
                const res = await fetch(`/api/v1/ws/${ws}/galaxy`);
                const p = await res.json();
                if (!p.ok) throw new Error(p.error?.message || "Render failed");
                galaxyData = p.data;

                renderGalaxy();

                setTimeout(() => {
                    loader.style.opacity = '0';
                    loader.style.pointerEvents = 'none';
                }, 500);

            } catch (e) {
                console.error(e);
                alert("Error loading Map: " + e.message);
                loader.style.opacity = '0';
            }
        }

        function renderGalaxy() {
            const { nodes, links } = galaxyData;

            // 1. Build Point Cloud (Stars/Mountains)
            const geometry = new THREE.BufferGeometry();
            const positions = new Float32Array(nodes.length * 3);
            const colors = new Float32Array(nodes.length * 3);
            const sizes = new Float32Array(nodes.length);

            // Create ID mapping for links
            const nodeMap = new Map();

            nodes.forEach((n, i) => {
                nodeMap.set(n.id, n);

                // Multiply to spread the Z-axis more dramatically for "mountains"
                positions[i * 3] = n.x;
                positions[i * 3 + 1] = n.y;
                positions[i * 3 + 2] = n.z * 1.5; // elevate Z

                // Map type to color
                const color = typeColors[n.entity_type] || typeColors['_default'];

                // PASSTHROUGH RAW VIBRANT COLOR
                const importance = n.z / 100.0;
                const brightnessScale = 1.0; 

                // Keep colors highly visible (Full range)
                colors[i * 3] = color.r * brightnessScale;
                colors[i * 3 + 1] = color.g * brightnessScale;
                colors[i * 3 + 2] = color.b * brightnessScale;

                // Set dynamic explicit sizes instead of relying on depth blur
                const extraClaims = n.claim_count ? Math.min(n.claim_count * 0.5, 20) : 0;
                sizes[i] = 12.0 + (importance * 15.0) + extraClaims;

                // Track timeline info
                if (n.created_at > 0) {
                    if (timeMin === 0 || n.created_at < timeMin) timeMin = n.created_at;
                    if (n.created_at > timeMax) timeMax = n.created_at;
                }
            });

            // Cache original colors for restoring after focus mode
            originalColors = new Float32Array(colors);

            const colAttr = new THREE.BufferAttribute(colors, 3);
            geometry.setAttribute('position', new THREE.BufferAttribute(positions, 3));
            geometry.setAttribute('color', colAttr);       // Keep original for applyColors compatibility
            geometry.setAttribute('pointColor', colAttr);  // Use safely inside shader
            geometry.setAttribute('size', new THREE.BufferAttribute(sizes, 1));

            particles = new THREE.Points(geometry, pointsMaterial);
            scene.add(particles);

            // 2. Build Lines (Static Constellations)
            if (links && links.length > 0) {
                const linePositions = [];
                const lineColors = [];
                links.forEach(l => {
                    const src = nodeMap.get(l.source);
                    const tgt = nodeMap.get(l.target);
                    if (src && tgt) {
                        linePositions.push(
                            src.x, src.y, src.z * 1.5,
                            tgt.x, tgt.y, tgt.z * 1.5
                        );
                        lineColors.push(
                            0.3, 0.4, 0.6,
                            0.3, 0.4, 0.6
                        );
                    }
                });

                const lineGeo = new THREE.BufferGeometry();
                lineGeo.setAttribute('position', new THREE.Float32BufferAttribute(linePositions, 3));
                lineGeo.setAttribute('color', new THREE.Float32BufferAttribute(lineColors, 3));

                lines = new THREE.LineSegments(lineGeo, lineMaterial);
                scene.add(lines);
            }

            // Timeline setup
            if (timeMax > timeMin) {
                currentTime = timeMax;
                const slider = document.getElementById('timeline-slider');
                slider.min = timeMin;
                slider.max = timeMax;
                slider.value = timeMax;
                const minDate = new Date(timeMin).toLocaleDateString();
                const maxDate = new Date(timeMax).toLocaleDateString();
                document.getElementById('time-start').innerText = minDate;
                document.getElementById('time-end').innerText = maxDate;
                document.getElementById('time-current').innerText = maxDate;

                slider.addEventListener('input', (e) => {
                    currentTime = parseInt(e.target.value);
                    document.getElementById('time-current').innerText = new Date(currentTime).toLocaleDateString();
                    applyColors();
                });
            }

            // Adjust camera to fit
            camera.position.set(0, -1000, 1000);
            camera.lookAt(0, 0, 0);
        }

        // --- SEARCH FLY-TO LOGIC ---
        document.getElementById('search-form').addEventListener('submit', (e) => {
            e.preventDefault();
            const query = document.getElementById('search-input').value.toLowerCase();
            if (!query || !galaxyData.nodes) return;

            // Simple substring search prioritizing start matches
            let targetNode = null;
            for (let n of galaxyData.nodes) {
                if (n.name.toLowerCase().startsWith(query)) {
                    targetNode = n;
                    break;
                }
            }
            if (!targetNode) {
                for (let n of galaxyData.nodes) {
                    if (n.name.toLowerCase().includes(query)) {
                        targetNode = n;
                        break;
                    }
                }
            }

            if (targetNode) {
                const targetPos = new THREE.Vector3(targetNode.x, targetNode.y, targetNode.z * 1.5);

                // Open drawer safely
                openDrawer(targetNode);

                // Tween camera position
                gsap.to(camera.position, {
                    duration: 1.5,
                    x: targetPos.x,
                    y: targetPos.y - 150, // offset below so we look slightly up or at it
                    z: targetPos.z + 100,
                    ease: "power2.inOut"
                });

                // Tween controls target
                gsap.to(controls.target, {
                    duration: 1.5,
                    x: targetPos.x,
                    y: targetPos.y,
                    z: targetPos.z,
                    ease: "power2.inOut"
                });
            }
        });

        init();
    </script>
