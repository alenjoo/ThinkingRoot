[target.aarch64-unknown-linux-gnu]
# ort's dev-dependency on ureq with native-tls feature unifies native-tls
# across all ureq users, pulling in openssl-sys. We vendor OpenSSL so the
# build-script compiles its own and doesn't need system headers.
pre-build = [
    "dpkg --add-architecture arm64",
    "apt-get update",
    "apt-get install -y libssl-dev:arm64 pkg-config",
]

[target.aarch64-unknown-linux-gnu.env]
passthrough = ["OPENSSL_STATIC", "OPENSSL_VENDORED"]
