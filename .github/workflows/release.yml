name: Release

on:
  push:
    tags:
      - 'v[0-9]+.[0-9]+.[0-9]+'

env:
  CARGO_TERM_COLOR: always

jobs:
  # ── Build CLI binaries for all platforms ──────────────────────────────────
  build:
    name: Build (${{ matrix.target }})
    runs-on: ${{ matrix.os }}
    strategy:
      matrix:
        include:
          - os: ubuntu-latest
            target: x86_64-unknown-linux-gnu
            artifact: root-linux-amd64
          - os: ubuntu-latest
            target: aarch64-unknown-linux-gnu
            artifact: root-linux-arm64
            cross: true
          - os: macos-latest
            target: x86_64-apple-darwin
            artifact: root-macos-amd64
          - os: macos-latest
            target: aarch64-apple-darwin
            artifact: root-macos-arm64
          - os: windows-latest
            target: x86_64-pc-windows-msvc
            artifact: root-windows-amd64.exe

    steps:
      - uses: actions/checkout@v4
      - uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.target }}
      - uses: Swatinem/rust-cache@v2
        with:
          key: ${{ matrix.target }}

      - name: Install cross (Linux ARM64)
        if: matrix.cross
        run: cargo install cross --git https://github.com/cross-rs/cross

      - name: Build (native)
        if: ${{ !matrix.cross }}
        run: cargo build --release --no-default-features --target ${{ matrix.target }} -p thinkingroot-cli

      - name: Build (cross)
        if: matrix.cross
        run: cross build --release --no-default-features --target ${{ matrix.target }} -p thinkingroot-cli

      - name: Rename binary
        shell: bash
        run: |
          BIN=target/${{ matrix.target }}/release/root
          [ -f "${BIN}.exe" ] && BIN="${BIN}.exe"
          cp "$BIN" ${{ matrix.artifact }}

      - uses: actions/upload-artifact@v4
        with:
          name: ${{ matrix.artifact }}
          path: ${{ matrix.artifact }}

  # ── Generate checksums and create GitHub Release ───────────────────────────
  release:
    name: GitHub Release
    runs-on: ubuntu-latest
    needs: build
    permissions:
      contents: write
    steps:
      - uses: actions/checkout@v4

      - uses: actions/download-artifact@v4
        with:
          path: artifacts/
          merge-multiple: true

      - name: Generate checksums.txt
        run: |
          cd artifacts
          for f in root-linux-amd64 root-linux-arm64 root-macos-amd64 root-macos-arm64 root-windows-amd64.exe; do
            [ -f "$f" ] || { echo "Missing artifact: $f"; exit 1; }
          done
          sha256sum root-linux-amd64 \
                    root-linux-arm64 \
                    root-macos-amd64 \
                    root-macos-arm64 \
                    root-windows-amd64.exe \
            > checksums.txt
          cat checksums.txt

      - name: Create release
        uses: softprops/action-gh-release@v2
        with:
          repository: DevbyNaveen/releases
          token: ${{ secrets.RELEASES_PAT }}
          tag_name: ${{ github.ref_name }}
          name: ${{ github.ref_name }}
          files: |
            artifacts/root-linux-amd64
            artifacts/root-linux-arm64
            artifacts/root-macos-amd64
            artifacts/root-macos-arm64
            artifacts/root-windows-amd64.exe
            artifacts/checksums.txt
          generate_release_notes: false
          draft: false
          fail_on_unmatched_files: true

  # ── Trigger Homebrew formula bump ─────────────────────────────────────────
  homebrew-bump:
    name: Bump Homebrew formula
    runs-on: ubuntu-latest
    needs: release
    steps:
      - uses: mislav/bump-homebrew-formula-action@v3
        with:
          formula-name: root
          homebrew-tap: DevbyNaveen/homebrew-thinkingroot
          tag-name: ${{ github.ref_name }}
          download-url: https://github.com/DevbyNaveen/releases/releases/download/${{ github.ref_name }}/root-macos-arm64
        env:
          COMMITTER_TOKEN: ${{ secrets.HOMEBREW_PR_PAT }}
